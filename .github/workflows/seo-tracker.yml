name: Weekly SEO Rank Check

on:
  schedule:
    # PRIMARY weekly run — Sunday 18:00 UTC (11:30 PM IST). Starts a fresh snapshot.
    - cron: '0 18 * * 0'
    # AUTO-RESUME passes — Monday 01:00 / 09:00 / 17:00 UTC.
    # Each one finishes an unfinished run from the primary; if there's no
    # checkpoint left to resume, it exits immediately (see the "gate" step), so
    # it never starts a spurious fresh run or creates a duplicate column.
    - cron: '0 1 * * 1'
    - cron: '0 9 * * 1'
    - cron: '0 17 * * 1'
  workflow_dispatch:  # manual trigger (resumes if a checkpoint exists, else fresh)

# Never let two runs touch the sheet / checkpoint at the same time.
concurrency:
  group: seo-rank-check
  cancel-in-progress: false

jobs:
  rank-check:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write  # needed to commit progress file back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decide whether to run (gate)
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          # Manual runs and the PRIMARY weekly cron always proceed.
          # The auto-resume crons proceed ONLY if a checkpoint exists to finish,
          # so a completed week's data is never re-run into a new column.
          PRIMARY='0 18 * * 0'
          if [ "$EVENT_NAME" = "schedule" ] && [ "$SCHEDULE" != "$PRIMARY" ]; then
            if [ -f rank_check_progress.json ]; then
              echo "Auto-resume cron: checkpoint found -> resuming."
              echo "proceed=true" >> "$GITHUB_OUTPUT"
            else
              echo "Auto-resume cron: no checkpoint -> nothing to finish, skipping run."
              echo "proceed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            if [ -f rank_check_progress.json ]; then
              echo "Found saved progress file -> will resume from last checkpoint."
            else
              echo "No progress file found -> starting fresh."
            fi
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.gate.outputs.proceed == 'true'
        run: pip install gspread google-auth requests tqdm

      - name: Run SEO Rank Tracker
        if: steps.gate.outputs.proceed == 'true'
        env:
          VALUESERP_API_KEY: ${{ secrets.VALUESERP_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          CI: true
        run: python seo_rank_tracker_valueserp.py

      - name: Commit progress file (if run was interrupted or completed)
        # always() so it runs even if the tracker step timed out, but skip it
        # entirely when the gate decided not to run.
        if: ${{ always() && steps.gate.outputs.proceed == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f rank_check_progress.json ]; then
            git add rank_check_progress.json
            git diff --cached --quiet || git commit -m "chore: save rank check progress [skip ci]"
            git push
          else
            # Completed successfully — remove stale progress file if it exists in git
            if git ls-files --error-unmatch rank_check_progress.json 2>/dev/null; then
              git rm rank_check_progress.json
              git commit -m "chore: remove completed rank check progress [skip ci]"
              git push
            fi
          fi
